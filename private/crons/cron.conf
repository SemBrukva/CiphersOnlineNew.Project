# Skeleton — PROD cron schedule
# Source of truth, managed via git
# Applied to /etc/cron.d/skeleton-prod by deploy-prod
#
# Format: min hour day month weekday USER command
# (/etc/cron.d format requires USER after the five time fields)

# Очистка устаревших файлов сессий (порог — session.lifetime из конфига)
0 * * * * deploy php /var/www/skeleton-prod/private/crons/cleanup_old_sessions.php

# Ежедневная синхронизация semantic-core JSON в БД и сбор позиций в Яндекс Вебмастере
10 6 * * * deploy php /var/www/skeleton-prod/bin/console semantic:sync
20 6 * * * deploy php /var/www/skeleton-prod/bin/console semantic:yandex:rank
