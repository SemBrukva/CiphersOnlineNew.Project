services:

  # ── PHP-FPM ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: development
    volumes:
      - .:/var/www
      - composer_cache:/root/.composer/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    env_file:
      - ./private/.env
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      memcached:
        condition: service_started
        required: false
    networks:
      - skeleton

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - skeleton

  # ── MySQL (профиль: mysql) ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    profiles: [mysql]
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-skeleton}
      MYSQL_USER:          ${DB_USERNAME:-skeleton}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skeleton

  # ── Memcached (профиль: memcached) ────────────────────────────────────────
  memcached:
    image: memcached:1.6-alpine
    profiles: [memcached]
    ports:
      - "11211:11211"
    networks:
      - skeleton

  # ── Redis (профиль: redis) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: [redis]
    ports:
      - "6379:6379"
    networks:
      - skeleton

networks:
  skeleton:
    driver: bridge

volumes:
  mysql_data:
  composer_cache:
